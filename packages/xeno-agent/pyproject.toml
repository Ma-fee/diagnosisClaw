[project]
name = "xeno-agent"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "yuchen.liu", email = "yuchen.liu@irootech.com" }
]
requires-python = ">=3.12"
dependencies = [
    "crewai>=1.8",
    "python-dotenv>=1.0.0",
    "pydantic[email]>=2.0.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "mcp>=1.0.0",
    "httpx>=0.25.0",
    "nest-asyncio>=1.6.0",
    "litellm>=1.75.3",
    "apscheduler~=3.10.4",
    "fastapi-sso>=0.17.0",
    "pydantic-ai>=0.0.18",
    "agent-client-protocol>=0.7.1",
    "agentpool",
]

[project.scripts]
xeno-agent = "xeno_agent.pydantic_ai.main:main"

[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]
