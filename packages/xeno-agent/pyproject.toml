[project]
name = "xeno-agent"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "yuchen.liu", email = "yuchen.liu@irootech.com" }
]
requires-python = ">=3.12"
dependencies = [
    "crewai>=0.80.0",
    "litellm[proxy]>=1.50.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "mcp>=1.0.0",
    "httpx>=0.25.0",
    "nest-asyncio>=1.6.0",
]

[project.scripts]
xeno-agent = "xeno_agent.main:main"

[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]
