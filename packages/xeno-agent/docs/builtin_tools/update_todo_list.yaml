description: "Incrementally manage a TODO list by tracking only changes (creation, status updates, and insertions). Designed for complex, multi-step tasks requiring dynamic progress tracking.\n\n**Core Principle**: \U0001F6A8 ONLY include items that are **new** or have a **status change**. Unchanged existing items must NEVER appear in the todos parameter.\n\n**Key Features:**\n- **Incremental Updates**: Pass only modified or new items.\n- **Flexible Fields**: Supports custom fields like 'measurement', 'safety', etc.\n- **ID-based Tracking**: Uses unique 'id' to identify tasks.\n\n**When to Use:**\n- Tracking a complex task with multiple steps.\n- User provides multiple tasks or asks for a TODO list.\n- Updating the status of several tasks at once.\n\n**When NOT to Use:**\n- The task is simple and can be completed in one step.\n- The request is purely conversational.\n- No actionable items to track."
name: update_todo_list
parameters:
  type: object
  properties:
    message:
      type: string
      description: The message or result (5-20 words) associated with the todo item update.
    todos:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Unique identifier for the task (e.g., 'step_1', 'check_001').
          content:
            type: string
            description: The task description.
          status:
            type: string
            enum: [pending, in_progress, completed, skipped]
            description: Current status of the task.
          pos:
            type: string
            description: Optional position/sort order (e.g., "1", "1.1").
        required: [id]
      description: |-
        A list of todo objects for incremental updates.

        **Universal Rules:**
        - Every object MUST have an `id`.
        - Only include items that are **newly created** OR have a **status change**.

        **Example Usage:**

        ```python
        # Create new list
        update_todo_list(todos=[
            {"id": "step_1", "content": "Check pressure", "status": "in_progress"},
            {"id": "step_2", "content": "Verify safety", "status": "pending"}
        ])

        # Update status (Incremental)
        update_todo_list(todos=[
            {"id": "step_1", "status": "completed", "measurement": "20 MPa"}
        ])
        ```
  required:
    - todos
strict: false

