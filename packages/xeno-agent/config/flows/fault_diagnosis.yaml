name: "fault_diagnosis"
description: "Fault diagnosis flow for network devices"

tools:
  mcp_servers:
    - name: "kb"
      url: "http://10.147.254.3:7006/mcp"

participants:
  - id: "qa_assistant"
    role: "Initial assessment and knowledge retrieval"
  - id: "diagnostician"
    role: "Deep analysis and root cause identification"
  - id: "remediation_expert"
    role: "Proposing and verifying solutions"

delegation_rules:
  - from_agent: "qa_assistant"
    to_agent: "diagnostician"
    condition: "Initial data gathered"
  - from_agent: "diagnostician"
    to_agent: "remediation_expert"
    condition: "Root cause identified"
