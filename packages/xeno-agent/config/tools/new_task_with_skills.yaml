description: |-
  The new_task tool creates subtasks with specialized modes while maintaining a parent-child relationship. It breaks down complex projects into manageable pieces, each operating in the mode best suited for specific work.

  This tool is used to:
  - Decompose a complex project into smaller, focused, and manageable subtasks.
  - Assign different aspects of a task to specialized modes for optimal execution.
  - Maintain a clean context by separating distinct phases of work.
  - Inject specialized skills into subagent context for domain-specific tasks.

  ## Skills Usage

  The `load_skills` parameter allows parent agents to inject specialized skill instructions
  into the subagent's context. Skills provide domain-specific guidance, best practices,
  and procedural knowledge to help the subagent complete the task effectively.

  When to use skills:
  - Task requires domain expertise (e.g., Git operations, Python coding)
  - Subagent should follow specific guidelines or patterns
  - Quality standards must be enforced (e.g., code review practices)
  ```

name: new_task
parameters:
  type: object
  properties:
    mode:
      type: string
      description: The specialized mode for the new task. Must be one of the available modes.
    load_skills:
      type: array
      description: |
        Skill names to inject. REQUIRED - pass [] if no skills needed.
      items:
        type: string
        description: Skill name (e.g., "git-master", "python").
    message:
      type: string
      description: |
        A clear, concise statement of what the task entails.

        The initial instructions for this new task. Should be specific, precise, and concise.

        The "message" must contain the following content:
          - All necessary background information from the parent task or previous sub-tasks required to complete this task.
          - The goal that this sub-task should achieve.
          - In markdown format for readability.
    expected_output:
      type: string
      description: |-
        A precise definition of the successful outcome for this sub-task. The final result from the sub-task must strictly conform to this description. It should clearly and narrowly define:
        - The specific work to be performed *only* within this sub-task.
        - The exact format and content of the expected return value.
        No deviations or additional work beyond this scope are permitted.
  required:
    - mode
    - load_skills
    - message
    - expected_output
  strict: true
