name: switch_mode
description: |
  【切换角色/模式】
  使用场景：
  1. QA Assistant → Fault Expert: 检测到复杂故障诊断场景
  2. Fault Expert → Equipment Expert: 需要物理操作/现场指导
  3. Equipment Expert → Fault Expert: Active 模式下返回编排

  说明：完全切换到新角色，原角色不再执行
parameters:
  mode_slug:
    type: string
    description: The slug of the mode to switch to.
    required: true
  reason:
    type: string
    description: The reason for switching.
    required: true
python_module: "xeno_agent.tools.meta_tools"
python_class: "SwitchModeTool"
metadata:
  category: meta
