default_agent: fault_expert

skills:
  paths:
    - "./skills/"
  include_default: false
  instruction:
    mode: metadata
    max_skills: 20
storage:
  title_generation_model: "openai-chat:svc/kimi-k2"

observability:
  enabled: true
  provider:
    type: custom
    endpoint: "http://phoenix.ai.rootcloud.info/"
    service_name: "agentpool"
    protocol: "http/protobuf"

anchors:
  question_tool: &question_tool
    type: custom
    import_path: "xeno_agent.agentpool.resource_providers.question_provider:QuestionProvider"
    kw_args:
      schemas:
        xeno_ask_followup_question: ./tools/ask_followup_question.yaml

model_variants:
  ack-dev:
    type: string
    identifier: "openai-chat:svc/kimi-k2"
  glm-4.7:
    type: string
    identifier: "openai-chat:svc/glm-4.7"

agents:
  fault_expert:
    type: native
    model: ack-dev
    description: |
      Fault diagnosis expert for systematic fault analysis,
      hypothesis generation, and solution formulation.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/fault_expert.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    tools:
      - *question_tool
      - type: skills
        injection_mode: metadata
        max_skills: 10
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
        kw_args:
          enabled_tools: ["new_task"]
          schemas:
            new_task: ./tools/new_task_with_skills.yaml
      #       attempt_completion: ../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          schemas:
            update_todo_list: "./tools/update_todo_list.yaml"
      - type: file_access

  equipment_expert:
    type: native
    model: ack-dev
    description: |
      Equipment expert for analyzing equipment images,
      panels, diagrams, and providing hands-on guidance.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/equipment_expert.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    tools:
      - type: skills
        injection_mode: metadata
        max_skills: 5
      # - type: custom
      #   import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
      #   kw_args:
      #     enabled_tools: ["attempt_completion"]
      #     schemas:
      #       attempt_completion: ../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          schemas:
            update_todo_list: "./tools/update_todo_list.yaml"
      - type: file_access

  material_assistant:
    type: native
    model: ack-dev
    description: |
      Material assistant for deep technical information retrieval
      and document research.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/material_assistant.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    mcp_servers:
      - type: streamable-http
        url: "http://10.147.254.3:7006/mcp"
        enabled_tools: ["search_database"]
    tools:
      - type: skills
        injection_mode: metadata
      - type: file_access
      # - type: custom
      #   import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
      #   kw_args:
      #     enabled_tools: ["attempt_completion"]
      #     schemas:
      #       attempt_completion: ../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
