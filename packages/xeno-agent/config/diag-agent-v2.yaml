default_agent: technical_assistant

skills:
  paths:
    - "./skills/"
  include_default: false
  instruction:
    mode: metadata
    max_skills: 20
storage:
  title_generation_model: "openai-chat:svc/kimi-k2"

observability:
  enabled: true
  provider:
    type: custom
    endpoint: "http://phoenix.ai.rootcloud.info/"
    service_name: "agentpool"
    protocol: "http/protobuf"

.anchors:
  question_tool: &question_tool
    type: question
    description: |-
      Ask the user a clarifying question with structured options.

      Use this tool for ALL user interactions requiring input or choices.

      **CRITICAL**: Must provide response_schema with enum for the question to render properly.

      Parameters:
      - prompt: The question text to display
      - response_schema: JSON schema with enum defining expected response options

      **REQUIRED response_schema formats**:

      1. Single choice (most common):
         {
           "type": "string",
           "enum": ["Option A", "Option B", "Option C"]
         }

      2. Single choice with descriptions:
         {
           "type": "string",
           "enum": ["PostgreSQL", "MySQL", "SQLite"],
           "x-option-descriptions": {
             "PostgreSQL": "Best for production workloads",
             "MySQL": "Compatible with many tools",
             "SQLite": "Lightweight, file-based"
           }
         }

      3. Multiple choice:
         {
           "type": "array",
           "items": {
             "type": "string",
             "enum": ["Auth", "API", "Analytics"]
           }
         }

      **MUST include enum field** - Without enum, the UI cannot render selectable options.

  question_for_user_tool: &question_for_user_tool
    type: custom
    import_path: xeno_agent.agentpool.resource_providers:QuestionForUserProvider
    kw_args:
      schemas:
        question_for_user: ./tools/question_for_user.yaml

model_variants:
  ack-dev:
    type: string
    identifier: "openai-chat:svc/kimi-k2"
  glm-4.7:
    type: string
    identifier: "openai-chat:svc/glm-4.7"
  qwen35:
    type: string
    identifier: "openai-chat:svc/qwen35"

agents:
  technical_assistant:
    type: native
    model: ack-dev
    description: |
      General-purpose equipment technical assistant with intelligent routing capabilities.
      Handles routine equipment inquiries, manual retrieval, parameter queries, and
      basic technical Q&A. Automatically detects fault diagnosis scenarios and escalates
      to systematic troubleshooting workflow when needed. Serves as the primary entry
      point for all equipment-related interactions.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/technical_assistant.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    mcp_servers:
      - type: streamable-http
        url: "http://10.147.254.3:8721/mcp"
        enabled_tools: ["search_database"]
    tools:
      # - *question_tool
      - *question_for_user_tool
      - type: skills
        injection_mode: metadata
        max_skills: 15
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
        kw_args:
          enabled_tools: ["new_task"]
          schemas:
            new_task: ./tools/new_task_with_skills.yaml
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          schemas:
            update_todo_list: "./tools/update_todo_list.yaml"

  material_assistant:
    type: native
    model: qwen35
    description: |
      Investigates specific topics deeply and generates structured reports. Output format and organization are guided by domain-specific skills. Use when research-backed documentation is needed; avoid for pure report generation without investigation.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/material_assistant.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    mcp_servers:
      - type: streamable-http
        url: "http://10.147.254.3:8721/mcp"
        enabled_tools: ["search_database"]
    # tools:
    # - type: skills
    # injection_mode: metadata
