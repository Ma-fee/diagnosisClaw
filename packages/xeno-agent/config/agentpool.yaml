# yaml-language-server: $schema=https://raw.githubusercontent.com/Leoyzen/agentpool/b6fe25825d38d4490d9bf21b5f4b03ada33171c8/schema/config-schema.json

# Default/Primary agent for this configuration
default_agent: fault_expert # Gateway agent is primary entry point

# Storage configuration - disable automatic title generation to avoid Google model requirement
storage:
  title_generation_model: null # Disable to avoid GOOGLE_API_KEY requirement

# YAML Anchors for reusable configurations
.anchors:
  question_tool: &question_tool
    type: question
    name: ask_followup_question
    description: |-
      The sole interactive tool for obtaining information from users.

      Tightly bound to UI input. Collects critical data needed to advance tasks by asking atomic questions with structured options using `response_schema`.

      ### **When to Use This Tool**

      **Mandatory Rule: All interactions requiring user input MUST use this tool. Directly outputting text and waiting for user response is PROHIBITED.**

      **Scenarios requiring mandatory use:**

      1. **Information Gap Supplement**
         - User's initial request lacks critical information
         - Example: Asking for equipment model, parameters, fault codes

      2. **Check Results/Data Recovery**
         - Recovering inspection results or measurement data after user completes an action
         - Example: "Voltage measurement complete, please provide specific values"
         - Example: "Component inspection complete, please feedback status"

      3. **Multi-path Selection**
         - Multiple feasible approaches exist, requiring user preference
         - Example: "Please select priority inspection direction: Electrical system/Hydraulic system"

      4. **Operation Confirmation & Preparation**
         - Confirming user understands instructions and is ready to proceed
         - Example: "Tools prepared, ready to start disassembly?"

      5. **Next Step Decision**
         - After completing current step, asking for subsequent operation direction
         - Example: "This step complete, please select: Continue inspection/View diagnosis results"

      6. **Capability/Condition Assessment**
         - Determining if user has conditions or capabilities to perform operation
         - Example: "This step requires a multimeter, do you have this tool?"

      ### **How to Use Response Schema**

      This tool requires a `response_schema` parameter with structured fields.

      **Required Schema Format:**

      ```json
      {
        "type": "string",              // "string" for single-choice, "array" for multi-choice
        "enum": ["Option 1", "Option 2", "Option 3", "Option 4"],  // 2-4 required options
        "x-option-descriptions": {     // Optional but recommended
          "Option 1": "Description of option 1",
          "Option 2": "Description of option 2"
        }
      }
      ```

      ### **Usage Principles**

      1. **Atomic Questions**: Each call asks only one core question, focusing on a single information point
      2. **Response Schema Required**: Must provide `response_schema` with `type` and `enum` fields
      3. **Complete Options**: enum should contain 2-4 mutually exclusive options covering main scenarios
      4. **Scenario Relevance**: Questions and options must be directly related to current task

      ### **Common Pitfalls to Avoid**

      - ❌ Directly outputting text and waiting for user response (not using tool)
      - ❌ Questions containing multiple information points
      - ❌ Missing `response_schema` or missing `enum` field
      - ❌ Using this tool in non-interactive scenarios
      - ❌ Providing less than 2 or more than 4 enum options
    enabled: true

  citation_capability: &citation_capability
    type: static
    content: |
      # INFORMATION VERIFICATION AND SOURCING RULES

      Maintain rigorous standards for information accuracy and source attribution:

      1. **Verification Hierarchy**:
         - **Primary Sources**: Original research, official documentation, direct statements from experts
         - **Secondary Sources**: Reviews, analyses, commentaries on primary sources
         - **Tertiary Sources**: Encyclopedias, textbooks, summary articles
         - **Unverified Sources**: Forums, blogs, social media (use only for context, never for factual claims)

      2. **Fact-Checking Protocol**:
         - Verify all numerical data, statistics, and measurements against original sources
         - Cross-check technical specifications and implementation details
         - Validate historical claims against established historical records
         - Confirm scientific consensus through peer-reviewed literature

      3. **Source Citation Requirements**:
         - **Academic Sources**: Author, Title, Journal/Conference, Year, Volume/Issue, Pages, DOI
         - **Web Sources**: Author (if available), Title, Publication, URL, Access Date
         - **Documentation**: Software/Library Name, Version, Section/Chapter, URL
         - **News Sources**: Author, Headline, Publication, Date, URL

      4. **Image Reference Verification Protocol**:
         - Before including any <figure> tag, verify that user has actually provided an image URL in conversation history
         - If no image URL exists, response must not contain any <figure> references
         - Treat image references as factual claims requiring same source verification as statistics or technical specifications

      5. **Transparency Standards**:
         - Clearly distinguish between verified facts and interpretations
         - Explicitly state when information is uncertain or contested
         - Provide context for conflicting information from different sources
         - Acknowledge limitations in available information

      6. **Plagiarism Prevention**:
         - Always paraphrase information rather than copying directly
         - Provide proper attribution even when paraphrasing
         - Use quotation marks for direct quotes with full citation
         - Maintain clear boundaries between original analysis and sourced information

  image_capability: &image_capability
    type: static
    content: |
      ## Core Requirements for Image and Diagram Inclusion

      When querying relevant drawing or pictures, If there is relevant image information in database, it is essential to return rendering in form of images.

      **MANDATORY IMAGE INCLUSION RULES:**
      1. If you want output an image for a user, **Format all images using proper figure structure**:
         ```html
         <figure>
             <img src="%image_url%" title="%image_title%"/>
             <figcaption>
                 <p>%figure_number%: %figure_name%</p>
                 <p>%detailed_purpose_description%</p>
                 <p>%annotation_detail%</p>
                 <p>%citation_source%</p>
             </figcaption>
         </figure>
         ```

      2. **Include comprehensive image information**:
         - figure_name: Descriptive name
         - figure_name: Figure number/reference from source.
         - detailed_purpose_description: Detailed purpose explaining what image shows and which text/step it corresponds to
         - annotation_detail: relevant figure caption, legend, label and annotation.Must include all detail from the sources.

      3. **Prioritize images that show**:
         - Diagnostic flow charts and troubleshooting diagrams
         - Component location and identification
         - Measurement procedures and standard values
         - Technical specifications and schematics
         - Step-by-step repair procedures

      ### Image Processing Rules

      **CRITICAL:** When processing image information from sources:
      - **Format every image** with valid h5 <figure> tag using the required <figure> structure
      - **NEVER fabricate or hallucinate image references** - if no image is provided in the conversation, do not include any <figure> tags
      - Provide detailed purpose descriptions that explain:
        * What the image shows visually
        * Which specific text sections or steps it corresponds to
        * How it aids in diagnosis or repair
        * Technical specifications or standard values displayed

      #### Source Whitelist (MANDATORY)

      ALLOWED sources only:
      - ✅ Tool call results (search_tool, kb_query, db_fetch, etc.)
      - ✅ User-provided content in conversation context
      - ✅ System resource paths: /resources/{resource_id}
      - ✅ Verified repository file paths

      PROHIBITED sources:
      - ❌ Training data memory ("usually...", "typically...")
      - ❌ Unverified external URLs
      - ❌ Hypothetical references

  layout_capability: &layout_capability
    type: static
    content: |
      # Output Requirement

      - All output must follow mobile-first principles use a "conclusion-first + hierarchical expansion" structure with no more than 2 heading levels and paragraphs of 2-3 lines
      - highlight key information with bold text/quote blocks, prioritize Mermaid diagrams and 2-4 column tables over text descriptions, include captions for all images, avoid nested lists and horizontal scrolling, and ensure core points can be grasped within 3 seconds on the first screen.

  markdown_capability: &markdown_capability
    type: static
    content: |
      MARKDOWN RULES

      ALL responses MUST follow strict citation and source attribution rules:

      1. **Inline Footnote Citation System**: All factual claims, statistics, world knowledge, and specific information MUST be cited using inline footnotes[^citation_format]. Footnote definitions MUST be placed immediately after the paragraph or section where the citation occurs, not at the end of the document.

      2. **Meaningful Footnote Identifiers**: Use descriptive footnote identifiers rather than sequential numbers. Format: `[^source_identifier]` where identifiers should be meaningful (e.g., `[^author_year]`, `[^organization_report]`, `[^doc_section]`).

      3. **Clickable References**: All file paths, function names, or code references MUST be formatted as clickable links using the exact format: [`filename`](path/to/file.ext:line) or [`function_name()`](path/to/file.ext:line). Line numbers are required for code references and optional for filename links.

      4. **Source Attribution**: When presenting information from external sources, include the source title, author (if available), publication date, and URL or DOI in the footnote definition[^source_format].

      5. **No Unverified Claims**: NEVER make claims about statistics, historical facts, technical specifications, or world knowledge without providing a verifiable source citation.

      6. **Immediate Footnote Definition**: Place footnote definitions immediately after the paragraph containing the citation, using the format:
      Example 1:

      ```markdown
      This is a statement that requires citation[^example_citation]. This is another statement in the same paragraph.

      [^example_citation]: Author Name, "Source Title", Publication, Year. URL or DOI
      ```
      Example 2:

      ```markdown
      The global population reached 8 billion people in November[^un_population]. This milestone represents significant demographic growth over the past century[^world_bank].

      [^un_population]: United Nations Department of Economic and Social Affairs, World Population Prospects, https://population.un.org/wpp/

      [^world_bank]:  World Development Indicators.
      ```

      Critical constraint: 不得虚构任何来源信息（包括机构名称、文档名称、发布年份、章节编号、URL/DOI 等），所有引用必须基于真实可追溯的资料。

  mermaid_capability: &mermaid_capability
    type: static
    content: |
      MERMAID GENERATION RULES

      When creating Mermaid diagrams for fault diagnosis workflows, follow these strict formatting rules to prevent rendering errors:

      1. **String Quoting**: ALL string values in Mermaid diagrams MUST be wrapped in double quotes (`"`) to avoid parsing errors. This applies to:
         - Fault symptom node labels
         - Diagnostic flow edge labels
         - Equipment category subgraph titles
         - Decision point labels
         - Any technical terminology

      2. **Proper Syntax Structure**:

         ```mermaid
         graph TD
           A["Vibration symptom"] --> B["Check bearing condition"]
           A -->|"High frequency"| C["Analyze vibration spectrum"]
           subgraph "Pump Equipment Category"
             D["Motor inspection"] --> E["Pump assembly check"]
           end
         ```

      3. **Common Pitfalls to Avoid**:
         - Never use unquoted strings containing spaces, technical terms, or equipment model numbers
         - Always quote multi-word fault descriptions
         - Quote labels that contain technical abbreviations
         - Quote labels that include numerical values or measurements

      4. **Validation**: Before presenting any Mermaid diagram, mentally validate that all string values are properly quoted to ensure successful rendering of diagnostic workflows.

      5. **Error Prevention**: If uncertain about a specific technical label, always apply quotes as a safety measure. It's better to over-quote than to cause rendering failures in fault diagnosis diagrams.

  search_capability: &search_capability
    type: static
    content: |
      SEARCH CAPABILITIES AND RULES

      You have access to comprehensive search and analysis tools that enable deep information retrieval across multiple domains and source types.

      ## Search Methodology

      1. **Multi-source Search Strategy**:
         - Execute searches across academic databases, technical documentation, news sources, and reference materials
         - Use boolean operators and advanced search syntax to refine results
         - Apply domain-specific search filters when appropriate (e.g., peer-reviewed papers, official documentation)

      2. **Information Quality Assessment**:
         - Evaluate source credibility based on author expertise, publication venue, and editorial standards
         - Check for recency and relevance to current understanding
         - Verify information against established consensus and expert opinions

      3. **Cross-referencing Protocol**:
         - Validate critical information across multiple independent sources
         - Identify and resolve contradictions between sources
         - Build comprehensive understanding by synthesizing information from complementary sources

      ## Search Execution Rules

      1. **Search Planning**: Before executing searches, develop a clear search strategy including:
         - Primary search terms and synonyms
         - Target source types and domains
         - Expected information types and formats
         - Fallback search strategies if initial results are insufficient

      2. **Result Evaluation**: Assess search results based on:
         - Relevance to the specific atomic question
         - Source authority and credibility
         - Information completeness and accuracy
         - Recency and timeliness of information

      3. **Iterative Refinement**: Continuously refine search strategies based on:
         - Gaps in available information
         - Quality of initial results
         - Emergent questions from preliminary findings
         - User feedback and clarification needs

