default_agent: fault_expert

storage:
  title_generation_model: "litellm:svc/glm-4.7"

observability:
  enabled: true
  provider:
    type: custom
    endpoint: "http://phoenix.ai.rootcloud.info/v1/traces"
    service_name: "agentpool"
    protocol: "http/protobuf"

anchors:
  question_tool: &question_tool
    type: custom
    import_path: "xeno_agent.agentpool.resource_providers.question_provider:QuestionProvider"
    kw_args:
      schemas:
        ask_followup_question: ../../../../docs/rfc/001_agent_system_design/builtin_tools/ask_followup_question.yaml

model_variants:
  litellm_chat:
    type: string
    identifier: "litellm:svc/glm-4.7"

agents:
  fault_expert:
    type: native
    model: "openai-chat:svc/glm-4.7"
    description: |
      Fault diagnosis expert for systematic fault analysis,
      hypothesis generation, and solution formulation.
    system_prompt:
      - type: file
        content: ""
        path: "/Users/yuchen.liu/src/yilab/iroot-llm/packages/xeno-agent/config/prompts/roles/fault_expert.j2"
        variables:
          LANG: "English"
    tools:
      - *question_tool
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
        kw_args:
          schemas:
            new_task: ../../../../docs/rfc/001_agent_system_design/builtin_tools/new_task.yaml
            attempt_completion: ../../../../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          schemas:
            update_todo_list: "../../../../docs/rfc/001_agent_system_design/builtin_tools/update_todo_list.yaml"

  equipment_expert:
    type: native
    model: "openai-chat:svc/glm-4.7"
    description: |
      Equipment expert for analyzing equipment images,
      panels, diagrams, and providing hands-on guidance.
    system_prompt:
      - type: file
        content: ""
        path: "/Users/yuchen.liu/src/yilab/iroot-llm/packages/xeno-agent/config//prompts/roles/equipment_expert.j2"
        variables:
          LANG: "English"
    tools:
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          enabled_tools: ["attempt_completion"]
          schemas:
            update_todo_list: "../../../../docs/rfc/001_agent_system_design/builtin_tools/update_todo_list.yaml"

  material_assistant:
    type: native
    model: "openai-chat:svc/glm-4.7"
    description: |
      Material assistant for deep technical information retrieval
      and document research.
    system_prompt:
      - type: file
        content: ""
        path: "/Users/yuchen.liu/src/yilab/iroot-llm/packages/xeno-agent/config/prompts/roles/material_assistant.j2"
        variables:
          LANG: "English"
    mcp_servers:
      - type: streamable-http
        url: "http://10.147.254.3:7006/mcp"
        enabled_tools: ["search_database"]
    tools:
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
        kw_args:
          enabled_tools: ["attempt_completion"]
          schemas:
            attempt_completion: ../../../../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
