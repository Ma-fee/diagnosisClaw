# yaml-language-server: $schema=https://raw.githubusercontent.com/Leoyzen/agentpool/b6fe25825d38d4490d9bf21b5f4b03ada33171c8/schema/config-schema.json

# Default/Primary agent for this configuration
default_agent: fault_expert # Gateway agent is the primary entry point

# Storage configuration - disable automatic title generation to avoid Google model requirement
storage:
  title_generation_model: null # Disable to avoid GOOGLE_API_KEY requirement

observability:
  enabled: true
  provider:
    type: custom
    endpoint: http://phoenix.ai.rootcloud.info/v1/traces
    service_name: agentpool
    # environment: production
    protocol: http/protobuf

# YAML Anchors for reusable configurations
.anchors:
  question_tool: &question_tool
    type: question
    name: ask_followup_question
    description: |-
      The sole interactive tool for obtaining information from users.

      Tightly bound to UI input. Collects critical data needed to advance tasks by asking atomic questions with structured options using `response_schema`.

      ### **When to Use This Tool**

      **Mandatory Rule: All interactions requiring user input MUST use this tool. Directly outputting text and waiting for user response is PROHIBITED.**

      **Scenarios requiring mandatory use:**

      1. **Information Gap Supplement**
         - User's initial request lacks critical information
         - Example: Asking for equipment model, parameters, fault codes

      2. **Check Results/Data Recovery**
         - Recovering inspection results or measurement data after user completes an action
         - Example: "Voltage measurement complete, please provide specific values"
         - Example: "Component inspection complete, please feedback status"

      3. **Multi-path Selection**
         - Multiple feasible approaches exist, requiring user preference
         - Example: "Please select priority inspection direction: Electrical system/Hydraulic system"

      4. **Operation Confirmation & Preparation**
         - Confirming user understands instructions and is ready to proceed
         - Example: "Tools prepared, ready to start disassembly?"

      5. **Next Step Decision**
         - After completing current step, asking for subsequent operation direction
         - Example: "This step complete, please select: Continue inspection/View diagnosis results"

      6. **Capability/Condition Assessment**
         - Determining if user has conditions or capabilities to perform operation
         - Example: "This step requires a multimeter, do you have this tool?"

      ### **How to Use Response Schema**

      This tool requires a `response_schema` parameter with structured fields.

      **Required Schema Format:**

      ```json
      {
        "type": "string",              // "string" for single-choice, "array" for multi-choice
        "enum": ["Option 1", "Option 2", "Option 3", "Option 4"],  // 2-4 required options
        "x-option-descriptions": {     // Optional but recommended
          "Option 1": "Description of option 1",
          "Option 2": "Description of option 2"
        }
      }
      ```

      ### **Usage Principles**

      1. **Atomic Questions**: Each call asks only one core question, focusing on a single information point
      2. **Response Schema Required**: Must provide `response_schema` with `type` and `enum` fields
      3. **Complete Options**: enum should contain 2-4 mutually exclusive options covering main scenarios
      4. **Scenario Relevance**: Questions and options must be directly related to current task

      ### **Common Pitfalls to Avoid**

      - ❌ Directly outputting text and waiting for user response (not using tool)
      - ❌ Questions containing multiple information points
      - ❌ Missing `response_schema` or missing `enum` field
      - ❌ Using this tool in non-interactive scenarios
      - ❌ Providing less than 2 or more than 4 enum options
    enabled: true

