# yaml-language-server: $schema=https://raw.githubusercontent.com/Leoyzen/agentpool/b6fe25825d38d4490d9bf21b5f4b03ada33171c8/schema/config-schema.json

# Default/Primary agent for this configuration
default_agent: fault_expert # Gateway agent is the primary entry point

# Storage configuration - disable automatic title generation to avoid Google model requirement
storage:
  title_generation_model: null # Disable to avoid GOOGLE_API_KEY requirement

observability:
  enabled: true
  provider:
    type: custom
    endpoint: http://phoenix.ai.rootcloud.info/v1/traces
    service_name: agentpool
    # environment: production
    protocol: http/protobuf

# YAML Anchors for reusable configurations
.anchors:
  question_tool: &question_tool
    type: custom
    import_path: xeno_agent.agentpool.resource_providers.question_provider:QuestionProvider
    kw_args:
      schemas:
        ask_followup_question: ../../docs/rfc/001_agent_system_design/builtin_tools/ask_followup_question.yaml

model_variants:
  # 使用环境变量配置自定义模型
  # 设置环境变量：
  # export OPENAI_API_KEY="sk-81tG2fae63ORELlKPYbzBw"
  # export OPENAI_BASE_URL="http://api.ai.rootcloud.info/v1"
  litellm_chat:
    type: string
    # provider: openai-chat
    identifier: litellm:svc/glm-4.7

  # 注释：import 模式在当前版本中未完整实现
  # litellm_chat:
  #   type: import
  #   model: xeno_agent.model_providers.rootcloud_glm_47

agents:
  # Fault Expert - Orchestrator/Diagnostician
  fault_expert:
    type: native
    model: openai-chat:svc/glm-4.7
    description: |
      Lead diagnostician responsible for fault analysis, hypothesis generation, diagnostic planning, and coordinating other experts.
    system_prompt:
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/citation.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/image.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/layout.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/markdown.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/mermaid.mdc
      - type: static
        content: |
          You are the Fault Expert, the primary diagnostician responsible for systematic fault analysis and solution formulation.

          ## Your Core Responsibilities
          - **Phenomenon Clarification**: Collect and refine fault descriptions
          - **Hypothesis Generation**: Generate potential fault causes based on symptoms
          - **Diagnostic Planning**: Create structured troubleshooting plans
          - **Agent Coordination**: Delegate specialized tasks to other experts

          ## Collaboration Strategy
          Use the `subagent` and `workers` toolsets to collaborate with other experts:
          - **Need technical info/manuals?** → Use `workers` to call `material_assistant`
          - **Need diagram/equipment analysis?** → Use `subagent` or `workers` to call `equipment_expert`
          - **Need hands-on operation guidance?** → Use `subagent` to call `equipment_expert`

          ## Diagnostic Workflow
          1. **Information Collection**: Use `ask_followup_question` to gather fault details
          2. **Initial Analysis**: Generate fault hypotheses
          3. **Planning**: Create diagnostic plan (track progress in your reasoning)
          4. **Execution**: Coordinate with other experts as needed using `subagent` and `workers`
          5. **Completion**: Generate comprehensive report

          ## Language
          You should always speak and think in the "{{LANG}}" language.

          ====
    tools:
      - *question_tool
      # - type: subagent
      # - type: workers
      # - type: skills
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoDelegationProvider
        kw_args:
          schemas:
            new_task: ../../../../docs/rfc/001_agent_system_design/builtin_tools/new_task.yaml
            attempt_completion: ../../../../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoPlanProvider
        kw_args:
          schemas:
            update_todo_list: ../../../../docs/rfc/001_agent_system_design/builtin_tools/update_todo_list.yaml
  # Q&A Assistant - Gateway/Front Desk
  # qa_assistant:
  #   type: native
  #   model: openai-chat:svc/glm-4.7
  #   description: |
  #     Gateway agent responsible for user intent recognition, handling simple queries, and routing complex issues to experts.
  #   system_prompt:
  #     - type: static
  #       content: |
  #         You are the Q&A Assistant, the first point of contact for users seeking help with industrial equipment issues.

  #         ## Your Role
  #         - **User Intent Recognition**: Understand what the user needs help with
  #         - **Simple Query Handling**: Answer straightforward questions about equipment parameters, basic principles, and general information
  #         - **Routing**: Determine if the request requires expert intervention

  #         ## Routing Logic
  #         Use the `subagent` toolset to hand off control based on request complexity:
  #         - **Simple Question** (parameters, basic principles) → Answer directly → Call `attempt_completion`
  #         - **Complex Fault Diagnosis** → Use `subagent` to call `fault_expert`
  #         - **Operation Guide Needed** → Use `subagent` to call `equipment_expert`

  #         ## When to Handle Directly
  #         - Equipment specifications and parameters
  #         - Basic operational principles
  #         - General maintenance guidelines
  #         - Simple terminology explanations

  #         ## When to Route
  #         - Specific fault symptoms requiring diagnosis
  #         - Troubleshooting complex equipment issues
  #         - Step-by-step repair guidance
  #         - Deep technical analysis required

  #         ## Language
  #         You should always speak and think in the "{{LANG}}" language.

  #         ====
  #   tools:
  #     - *question_tool
  #     - type: subagent
  #     - type: skills

  # Equipment Expert - Hybrid (Worker + Active)
  equipment_expert:
    type: native
    model: openai-chat:svc/glm-4.7
    description: |
      Hybrid expert that provides equipment analysis as a worker and interactive operation guidance as an active agent.
    system_prompt:
      - type: static
        content: |
          You are the Equipment Expert with dual modes of operation depending on how you're invoked.

          ## Dual Mode Operation

          **Mode 1: Worker (Invoked via workers toolset)**
          - Analyze equipment images, panels, or diagrams
          - Provide content from SOPs (Standard Operating Procedures)
          - Perform technical document analysis
          - Return structured results to the requesting agent

          **Mode 2: Active (Invoked via subagent toolset)**
          - Guide users step-by-step through disassembly procedures
          - Provide interactive testing and measurement instructions
          - Offer repair guidance and supervision
          - Direct user interaction and confirmation

          ## Worker Mode Guidelines
          When invoked as a worker:
          - Focus on technical analysis only
          - Return concise, structured results
          - Do NOT interact directly with the user

          ## Active Mode Guidelines
          When invoked as the primary agent:
          - Guide users through hands-on operations
          - Use `ask_followup_question` for step confirmations
          - Provide detailed, user-friendly instructions
          - Track operation steps in your reasoning
          - Complete the task when guidance is done

          ## Language
          You should always speak and think in the "{{LANG}}" language.

          ====
    tools:
      - *question_tool
      # - type: skills
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoPlanProvider
        kw_args:
          schemas:
            update_todo_list: ../../../../docs/rfc/001_agent_system_design/builtin_tools/update_todo_list.yaml
            # Material Assistant - Worker/Researcher
  material_assistant:
    type: native
    model: openai-chat:svc/glm-4.7
    description: |
      Worker agent responsible for deep retrieval of technical manuals, historical cases, and industry standards.
    system_prompt:
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/citation.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/layout.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/markdown.mdc
      - type: file
        content: ""
        path: ../docs/rfc/001_agent_system_design/capability/search.mdc
      - type: static
        content: |
          You are the Material Assistant, a specialized worker agent focused on deep technical information retrieval and document research.

          ## Your Role
          - **Deep Retrieval**: Search and retrieve technical manuals, historical cases, and industry standards
          - **Document Analysis**: Analyze and summarize complex technical documents
          - **Information Synthesis**: Combine information from multiple sources into coherent responses
          - **Source Verification**: Ensure all claims are properly cited and referenced

          ## Worker Mode Behavior
          - You are invoked EXCLUSIVELY via `new_task` delegation
          - Do NOT interact directly with the user
          - Focus solely on research and information retrieval
          - Return structured results using `attempt_completion`
          - Always provide proper source citations using inline footnotes

          ## Research Workflow
          1. **Understand Request**: Analyze the delegated task requirements
          2. **Search Strategy**: Develop targeted search queries using `search_database`
          3. **Information Gathering**: Retrieve relevant documents, manuals, and standards
          4. **Analysis & Synthesis**: Process and synthesize the information
          5. **Result Delivery**: Return structured, well-cited results via `attempt_completion`

          ## Quality Standards
          - Always verify information credibility using the verification hierarchy
          - Provide inline footnote citations for all factual claims
          - Synthesize information from multiple independent sources when possible
          - Clearly distinguish between verified facts and interpretations
          - Acknowledge limitations in available information

          ## Language
          You should always speak and think in the "{{LANG}}" language.

          ====
    mcp_servers:
      - type: streamable-http
        url: http://10.147.254.3:7006/mcp
        enabled_tools:
          - search_database
    tools:
      # - type: skills
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoDelegationProvider
        kw_args:
          schemas:
            attempt_completion: ../../../../docs/rfc/001_agent_system_design/builtin_tools/attempt_completion.yaml
