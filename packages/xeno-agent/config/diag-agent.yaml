# yaml-language-server: $schema=https://raw.githubusercontent.com/Leoyzen/agentpool/b6fe25825d38d4490d9bf21b5f4b03ada33171c8/schema/config-schema.json

# Default/Primary agent for this configuration
default_agent: fault_expert # Gateway agent is the primary entry point

# Storage configuration - disable automatic title generation to avoid Google model requirement
storage:
  title_generation_model: "openai-chat:svc/glm-4.7"

observability:
  enabled: true
  provider:
    type: custom
    endpoint: "http://phoenix.ai.rootcloud.info/"
    service_name: "agentpool"
    protocol: "http/protobuf"

# YAML Anchors for reusable configurations
.anchors:
  question_tool: &question_tool
    type: custom
    import_path: xeno_agent.agentpool.resource_providers.question_provider:QuestionProvider
    kw_args:
      schemas:
        ask_followup_question: ./tools/ask_followup_question.yaml

model_variants:
  ack-dev:
    type: string
    identifier: "openai-chat:svc/kimi-k2"
  glm-4.7:
    type: string
    identifier: "openai-chat:svc/glm-4.7"

agents:
  # Fault Expert - Orchestrator/Diagnostician
  fault_expert:
    type: native
    model: ack-dev
    description: |
      Lead diagnostician responsible for fault analysis, hypothesis generation, diagnostic planning, and coordinating other experts.
    system_prompt:
      - type: file
        content: ""
        path: ./prompts/capabilities/citation.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/image.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/layout.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/markdown.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/mermaid.j2
      - type: file
        content: ""
        path: "./prompts/roles/fault_expert.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    tools:
      - *question_tool
      # - type: subagent
      # - type: workers
      # - type: skills
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoDelegationProvider
        kw_args:
          schemas:
            new_task: ./tools/new_task.yaml
            attempt_completion: ./tools/attempt_completion.yaml
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoPlanProvider
        kw_args:
          schemas:
            update_todo_list: "./tools/update_todo_list.yaml"

  equipment_expert:
    type: native
    model: ack-dev
    description: |
      Equipment expert for analyzing equipment images,
      panels, diagrams, and providing hands-on guidance.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/equipment_expert.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    tools:
      - *question_tool
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoDelegationProvider"
        kw_args:
          enabled_tools: ["attempt_completion"]
          schemas:
            attempt_completion: ./tools/attempt_completion.yaml
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          schemas:
            update_todo_list: "./tools/update_todo_list.yaml"

  material_assistant:
    type: native
    model: ack-dev
    description: |
      Material assistant for deep technical information retrieval
      and document research.
    system_prompt:
      - type: file
        content: ""
        path: ./prompts/capabilities/citation.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/layout.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/markdown.j2
      - type: file
        content: ""
        path: ./prompts/capabilities/search.j2
      - type: file
        content: ""
        path: "./prompts/roles/material_assistant.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    mcp_servers:
      - type: streamable-http
        url: "http://10.147.254.3:8721/mcp"
        enabled_tools: ["search_database"]
    tools:
      # - type: skills
      - type: custom
        import_path: xeno_agent.agentpool.resource_providers.XenoDelegationProvider
        kw_args:
          schemas:
            attempt_completion: ./tools/attempt_completion.yaml
